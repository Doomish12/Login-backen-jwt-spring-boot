spring.application.name=login-backend-jwt

# Configuración para la base de datos MySQL en el host remoto
spring.datasource.url=jdbc:${DB_URI}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Configuración de Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración para la clave secreta JWT
security.jwt.secret-key=${JWT_KEY}
