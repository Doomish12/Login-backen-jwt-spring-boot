spring.application.name=login-backend-jwt

# Configuraci�n para el path y los paginables
server.servlet.context-path=/api/v1
spring.data.web.pageable.page-parameter=p
spring.data.web.pageable.size-parameter=limit

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/login_backend
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.user.datasource.driver-class-name=com.mysql.jdbc.driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


# Configuraci�n para la clave secreta JWT
security.jwt.secret-key=${JWT_KEY}
